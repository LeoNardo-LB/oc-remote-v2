<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link id="theme-css" rel="stylesheet" href="highlight/github-dark.min.css">
    <script src="highlight/highlight.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { background: var(--bg-color, #1e1e1e); }
        body {
            font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
            font-size: 13px; line-height: 1.5;
            -webkit-user-select: text; user-select: text;
            overflow-x: auto; padding: 8px;
            color: var(--text-color, #e0e0e0);
        }
        .container { display: flex; }
        .gutter {
            display: none;
        }
        .code-area { flex: 1; overflow-x: auto; }
        pre { margin: 0; white-space: pre; }
        pre code { font-family: inherit !important; padding: 0 !important; background: transparent !important; }
        .hljs { background: transparent !important; }
        /* Annotation highlight — user-select:none prevents WebView from
           intercepting click events with its text-selection mechanism */
        .annotated {
            background-color: rgba(255, 235, 59, 0.2);
            text-decoration: underline wavy #ffeb3b;
            cursor: pointer;
            -webkit-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="gutter" id="gutter"></div>
        <div class="code-area">
            <pre><code id="code" class="hljs"></code></pre>
        </div>
    </div>
    <script>
        var _rawCode = '';
        var _currentSelection = '';

        function setCode(code, lang) {
            // Normalize line endings so _rawCode matches DOM text exactly
            // (browser textContent converts \r\n → \n automatically)
            _rawCode = code.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            var codeEl = document.getElementById('code');
            codeEl.textContent = _rawCode;
            if (lang && hljs.getLanguage(lang)) {
                codeEl.className = 'hljs language-' + lang;
            } else {
                codeEl.className = 'hljs';
            }
            hljs.highlightElement(codeEl);
            var lines = _rawCode.split('\n');
            document.getElementById('gutter').textContent = lines.map(function(_, i) { return (i + 1); }).join('\n');
        }

        function setTheme(isDark) {
            document.getElementById('theme-css').href = isDark ? 'highlight/github-dark.min.css' : 'highlight/github.min.css';
            document.documentElement.style.setProperty('--bg-color', isDark ? '#1e1e1e' : '#ffffff');
            document.documentElement.style.setProperty('--text-color', isDark ? '#e0e0e0' : '#1e1e1e');
        }

        /** Reload code while preserving scroll position (for pagination). */
        function setCodePreserveScroll(code, lang) {
            var oldScroll = window.scrollY;
            setCode(code, lang);
            requestAnimationFrame(function() {
                window.scrollTo(0, oldScroll);
                // Re-apply annotations after content reload
            });
        }

        function setLabels(annotateLabel) {
            // Reserved for future use
        }

        /** Scroll to a specific line (1-based). Used for Edit tool jump. */
        function scrollToLine(line) {
            if (line <= 0) return;
            // Estimate: 13px font * 1.5 line-height ≈ 20px per line
            setTimeout(function() {
                window.scrollTo(0, line * 20);
            }, 100);
        }

        function getSelectionInfo() {
            var sel = window.getSelection();
            var text = sel.toString();
            if (!text || sel.rangeCount === 0) return ['', -1];

            // Use Range API to compute the actual char offset of the selection
            // start within the code element's text content. This is accurate even
            // when the selected text appears multiple times in the file.
            var range = sel.getRangeAt(0);
            var codeEl = document.getElementById('code');
            var startOffset = _getCharOffset(codeEl, range.startContainer, range.startOffset);

            // Fallback to indexOf if Range traversal fails (edge cases)
            if (startOffset < 0) startOffset = _rawCode.indexOf(text);

            return [text, startOffset];
        }

        /**
         * Walk text nodes under root, accumulating character counts until
         * we reach targetNode. Returns the absolute char offset of
         * targetOffset within targetNode, or -1 if not found.
         */
        function _getCharOffset(root, targetNode, targetOffset) {
            var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null, false);
            var offset = 0;
            while (walker.nextNode()) {
                var node = walker.currentNode;
                if (node === targetNode) {
                    return offset + targetOffset;
                }
                offset += node.textContent.length;
            }
            return -1;
        }

        function applyAnnotations(json) {
            var anns;
            try { anns = JSON.parse(json); } catch(e) { console.log('[Annotate] parse error: ' + e.message); return; }
            console.log('[Annotate] parsed anns: ' + JSON.stringify(anns));
            if (!anns || anns.length === 0) return;
            var codeEl = document.getElementById('code');
            anns.forEach(function(ann) {
                var text = ann.text || ann.selectedText || '';
                // Use index as identifier — more reliable than UUID string transfer
                var idStr = String(ann.index != null ? ann.index : 0);
                _highlightText(codeEl, text, ann.note || '', ann.index || 0, idStr);
            });
        }

        function _highlightText(root, searchText, note, annIndex, annId) {
            if (!searchText) return;
            var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null, false);
            var texts = [];
            while (walker.nextNode()) texts.push(walker.currentNode);
            var fullText = texts.map(function(n) { return n.textContent; }).join('');
            var idx = fullText.indexOf(searchText);
            if (idx < 0) return;
            var offset = 0;
            for (var i = 0; i < texts.length; i++) {
                var node = texts[i];
                var len = node.textContent.length;
                if (offset <= idx && idx < offset + len) {
                    var localStart = idx - offset;
                    var localEnd = localStart + searchText.length;
                    var span = document.createElement('span');
                    span.className = 'annotated';
                    span.title = note;
                    span.dataset.id = annId;
                    console.log('[Annotate] span created, id=' + annId);
                    // Use touchend — more reliable than click in Android WebView
                    // (text selection can swallow click events)
                    span.addEventListener('touchend', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        console.log('[Annotate] touchend fired, id=' + annId);
                        try {
                            AndroidBridge.onAnnotationClick(annId);
                            console.log('[Annotate] bridge called OK');
                        } catch(err) {
                            console.log('[Annotate] bridge ERROR: ' + err.message);
                        }
                    });
                    span.addEventListener('click', function(e) {
                        e.stopPropagation();
                        console.log('[Annotate] click fired, id=' + annId);
                        try { AndroidBridge.onAnnotationClick(annId); } catch(err) {}
                    });
                    var before = document.createTextNode(node.textContent.substring(0, localStart));
                    var annotated = document.createTextNode(node.textContent.substring(localStart, localEnd));
                    var after = document.createTextNode(node.textContent.substring(localEnd));
                    span.appendChild(annotated);
                    if (before.textContent) node.parentNode.insertBefore(before, node);
                    node.parentNode.insertBefore(span, node);
                    if (after.textContent) node.parentNode.insertBefore(after, span.nextSibling);
                    node.parentNode.removeChild(node);
                    return;
                }
                offset += len;
            }
        }
    </script>
</body>
</html>
