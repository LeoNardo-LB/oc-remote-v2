<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link id="theme-css" rel="stylesheet" href="highlight/github-dark.min.css">
    <script src="highlight/highlight.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { background: var(--bg-color, #1e1e1e); }
        body {
            font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
            font-size: 13px; line-height: 1.5;
            -webkit-user-select: text; user-select: text;
            overflow-x: auto; padding: 8px;
            color: var(--text-color, #e0e0e0);
        }
        .container { display: flex; }
        .gutter {
            text-align: right; padding-right: 12px; color: #6b7280;
            user-select: none; -webkit-user-select: none;
            white-space: pre; flex-shrink: 0;
        }
        .code-area { flex: 1; overflow-x: auto; }
        pre { margin: 0; white-space: pre; }
        pre code { font-family: inherit !important; padding: 0 !important; background: transparent !important; }
        .hljs { background: transparent !important; }
        .annotated {
            background-color: rgba(255, 235, 59, 0.2);
            text-decoration: underline wavy #ffeb3b;
        }
        /* Floating Annotate button */
        #annotate-btn {
            display: none;
            position: fixed;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 13px;
            z-index: 1000;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="gutter" id="gutter"></div>
        <div class="code-area">
            <pre><code id="code" class="hljs"></code></pre>
        </div>
    </div>
    <button id="annotate-btn">__ANNOTATE_LABEL__</button>
    <script>
        var _rawCode = '';
        var _currentSelection = '';

        function setCode(code, lang) {
            _rawCode = code;
            var codeEl = document.getElementById('code');
            codeEl.textContent = code;
            if (lang && hljs.getLanguage(lang)) {
                codeEl.className = 'hljs language-' + lang;
            } else {
                codeEl.className = 'hljs';
            }
            hljs.highlightElement(codeEl);
            var lines = code.split('\n');
            document.getElementById('gutter').textContent = lines.map(function(_, i) { return (i + 1); }).join('\n');
        }

        function setTheme(isDark) {
            document.getElementById('theme-css').href = isDark ? 'highlight/github-dark.min.css' : 'highlight/github.min.css';
            document.documentElement.style.setProperty('--bg-color', isDark ? '#1e1e1e' : '#ffffff');
            document.documentElement.style.setProperty('--text-color', isDark ? '#e0e0e0' : '#1e1e1e');
        }

        function setLabels(annotateLabel) {
            document.getElementById('annotate-btn').textContent = annotateLabel;
        }

        // Track text selection — show floating Annotate button
        document.addEventListener('selectionchange', function() {
            var sel = window.getSelection();
            _currentSelection = sel.toString();
            var btn = document.getElementById('annotate-btn');
            if (_currentSelection.trim().length > 0) {
                // Position button above the selection
                try {
                    var rect = sel.getRangeAt(0).getBoundingClientRect();
                    btn.style.display = 'block';
                    btn.style.left = (rect.left + rect.width/2 - 50) + 'px';
                    var top = rect.top - 44;
                    btn.style.top = (top < 8 ? rect.bottom + 8 : top) + 'px';
                } catch(e) {
                    btn.style.display = 'block';
                    btn.style.left = '50%';
                    btn.style.top = '20%';
                }
            } else {
                btn.style.display = 'none';
            }
        });

        // Annotate button click — capture selection synchronously in JS
        document.getElementById('annotate-btn').addEventListener('click', function() {
            var text = _currentSelection.trim();
            if (text.length === 0) return;
            // Find offset in original code
            var start = _rawCode.indexOf(text);
            if (start < 0) start = 0;
            // Hide button
            this.style.display = 'none';
            // Clear selection
            window.getSelection().removeAllRanges();
            // Call Android bridge directly — synchronous, no async round-trip
            if (window.AndroidBridge) {
                AndroidBridge.onSelection(text, start);
            }
        });

        // Hide button when tapping elsewhere
        document.addEventListener('touchstart', function(e) {
            if (!e.target.closest('#annotate-btn')) {
                // Delay to allow selectionchange to fire first
                setTimeout(function() {
                    if (_currentSelection.trim().length === 0) {
                        document.getElementById('annotate-btn').style.display = 'none';
                    }
                }, 300);
            }
        });

        function applyAnnotations(json) {
            var anns;
            try { anns = JSON.parse(json); } catch(e) { return; }
            if (!anns || anns.length === 0) return;
            var codeEl = document.getElementById('code');
            anns.forEach(function(ann) {
                var text = ann.text || ann.selectedText || '';
                _highlightText(codeEl, text, ann.note || '', ann.index || 0);
            });
        }

        function _highlightText(root, searchText, note, annIndex) {
            if (!searchText) return;
            var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null, false);
            var texts = [];
            while (walker.nextNode()) texts.push(walker.currentNode);
            var fullText = texts.map(function(n) { return n.textContent; }).join('');
            var idx = fullText.indexOf(searchText);
            if (idx < 0) return;
            var offset = 0;
            for (var i = 0; i < texts.length; i++) {
                var node = texts[i];
                var len = node.textContent.length;
                if (offset <= idx && idx < offset + len) {
                    var localStart = idx - offset;
                    var localEnd = localStart + searchText.length;
                    var span = document.createElement('span');
                    span.className = 'annotated';
                    span.title = note;
                    var before = document.createTextNode(node.textContent.substring(0, localStart));
                    var annotated = document.createTextNode(node.textContent.substring(localStart, localEnd));
                    var after = document.createTextNode(node.textContent.substring(localEnd));
                    span.appendChild(annotated);
                    if (before.textContent) node.parentNode.insertBefore(before, node);
                    node.parentNode.insertBefore(span, node);
                    if (after.textContent) node.parentNode.insertBefore(after, span.nextSibling);
                    node.parentNode.removeChild(node);
                    return;
                }
                offset += len;
            }
        }
    </script>
</body>
</html>
