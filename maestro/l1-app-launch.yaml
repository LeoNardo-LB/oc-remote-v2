appId: dev.leonardo.ocremoteplus.dev
name: L1 - App Launch
tags:
  - layer1
  - smoke
---

# Launch app with fresh state
- launchApp:
    clearState: true

# Wait for home screen - app title or empty state message
- extendedWaitUntil:
    visible: "OC Remote"
    timeout: 15000

# Assert the home screen loaded successfully
- assertVisible: "OC Remote"
- takeScreenshot: l1_app_launch_home

# If empty state visible, assert that too (no crash, just no servers)
- assertVisible: "Add Server"
- takeScreenshot: l1_app_launch_empty_state
