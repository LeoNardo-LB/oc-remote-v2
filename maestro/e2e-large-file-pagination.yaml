appId: dev.leonardo.ocremoteplus.dev
name: E2E - Large File Pagination
tags:
  - e2e
  - workspace
  - pagination
---

# Prerequisite: Server at 10.0.2.2:4096, session active, workspace accessible
# Validates Phase 4 pagination: initial load (500 lines) → scroll → loadMore (200 lines)

- launchApp

- extendedWaitUntil:
    visible: "Connected"
    timeout: 15000
    optional: true

# Navigate to a session
- tapOn:
    text: "Sessions"
    index: 0
- extendedWaitUntil:
    visible: "Search sessions..."
    timeout: 20000
    optional: true
- tapOn: "D:/Develop/code/app/oc-remote"
- extendedWaitUntil:
    visible: "sessions active"
    timeout: 15000
    optional: true
- tapOn:
    text: ".*"
    index: 0
- extendedWaitUntil:
    visible: "Ask a question"
    timeout: 20000
    optional: true

# Open workspace
- tapOn:
    id: "more_vert"
- tapOn:
    id: "menu_open_workspace"

# Search for a large Kotlin file
- tapOn:
    id: "workspace_search_button"
    optional: true
- tapOn:
    id: "workspace_search_input"
    optional: true
- inputText: "OpenCodeApi"
- tapOn:
    id: "workspace_search_result"
    index: 0
    optional: true

# Verify file viewer opened with content
- extendedWaitUntil:
    visible: ".*back_button.*"
    timeout: 5000
    optional: true
- takeScreenshot: e2e_pagination_initial_load

# Scroll down multiple times to trigger loadMore
- swipe:
    direction: UP
    duration: 500
- swipe:
    direction: UP
    duration: 500
- swipe:
    direction: UP
    duration: 500
- swipe:
    direction: UP
    duration: 500

# Verify load-more indicator appeared (optional — async timing)
- extendedWaitUntil:
    visible: ".*viewer_load_more_indicator.*"
    timeout: 5000
    optional: true
- takeScreenshot: e2e_pagination_load_more_triggered

# Continue scrolling, verify more content loaded
- swipe:
    direction: UP
    duration: 1000
- takeScreenshot: e2e_pagination_more_loaded

# Go back
- tapOn:
    id: "back_button"
