appId: dev.leonardo.ocremoteplus.dev
name: L2 - Session Archive Filter
tags:
  - layer2
  - sessions
  - archive
---

# Launch app
- launchApp

# Wait for home screen
- extendedWaitUntil:
    visible: "OC Remote"
    timeout: 15000

- assertVisible: "OC Remote"

# Check if server is configured
- assertVisible:
    text: "Connect"
    optional: true
- takeScreenshot: l2_archive_server_found

# Navigate to session list if server available
- tapOn:
    text: "Sessions"
    optional: true

# Wait for session list
- extendedWaitUntil:
    visible: "Search sessions..."
    timeout: 15000
    optional: true

- assertVisible:
    text: "Search sessions..."
    optional: true

# Wait for Archived filter chip
- extendedWaitUntil:
    visible: "Archived"
    timeout: 5000
    optional: true

- assertVisible:
    text: "Archived"
    optional: true
- takeScreenshot: l2_archive_filter_before

# Tap Archived filter to show archived sessions
- tapOn:
    text: "Archived"
    optional: true

# Wait for list update
- extendedWaitUntil:
    visible: ".*"
    timeout: 10000
    optional: true

- assertVisible:
    text: "Archived"
    optional: true
- takeScreenshot: l2_archive_filter_active

# Tap Archived again to deselect
- tapOn:
    text: "Archived"
    optional: true

# Wait for list to revert
- extendedWaitUntil:
    visible: ".*"
    timeout: 10000
    optional: true

- assertVisible:
    text: "Archived"
    optional: true
- takeScreenshot: l2_archive_filter_inactive
