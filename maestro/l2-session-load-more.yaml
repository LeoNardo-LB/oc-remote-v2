appId: dev.leonardo.ocremoteplus.dev
name: L2 - Session Load More
tags:
  - layer2
  - sessions
  - pagination
---

# Launch app
- launchApp

# Wait for home screen
- extendedWaitUntil:
    visible: "OC Remote"
    timeout: 15000

- assertVisible: "OC Remote"

# Check if server is configured
- assertVisible:
    text: "Connect"
    optional: true
- takeScreenshot: l2_loadmore_server_found

# Navigate to session list if server available
- tapOn:
    text: "Sessions"
    optional: true

# Wait for session list
- extendedWaitUntil:
    visible: "Search sessions..."
    timeout: 15000
    optional: true

- assertVisible:
    text: "Search sessions..."
    optional: true
- takeScreenshot: l2_load_more_initial

# Scroll down to trigger pagination
- swipe:
    direction: DOWN

# Wait for potential pagination
- extendedWaitUntil:
    visible: ".*"
    timeout: 10000
    optional: true

# Scroll down further
- swipe:
    direction: DOWN

# Wait for any additional pagination
- extendedWaitUntil:
    visible: ".*"
    timeout: 10000
    optional: true

- takeScreenshot: l2_load_more_scrolled

# Scroll back up and verify list still renders
- swipe:
    direction: UP

- assertVisible:
    text: "Search sessions..."
    optional: true
- takeScreenshot: l2_load_more_back_top
