appId: dev.leonardo.ocremoteplus.dev
name: L1 - Crash Recovery
tags:
  - layer1
  - crash
---

# First launch
- launchApp

# Wait for home screen
- extendedWaitUntil:
    visible: "OC Remote"
    timeout: 15000

- assertVisible: "OC Remote"
- takeScreenshot: l1_crash_before_stop

# Force stop the app (simulates crash)
- stopApp

# Relaunch - should recover gracefully
- launchApp

# Verify app comes back up
- extendedWaitUntil:
    visible: "OC Remote"
    timeout: 15000

- assertVisible: "OC Remote"
- takeScreenshot: l1_crash_recovery
