appId: dev.leonardo.ocremoteplus.dev
name: L4 - Chat UI Components
tags:
  - layer4
  - chat
---

# Launch app
- launchApp

# Wait for home screen
- extendedWaitUntil:
    visible: "OC Remote"
    timeout: 15000

- assertVisible: "OC Remote"
- takeScreenshot: l4_chat_app_loaded

# Navigate to Settings via overflow menu or navigation
# Tap on the Settings destination in bottom nav or app bar
- assertVisible:
    text: "Add Server"
    optional: true
- takeScreenshot: l4_chat_home_state

# If server is connected, try to navigate to chat
# Check if Connect button is visible (server configured)
- assertVisible:
    text: "Connect"
    optional: true
- takeScreenshot: l4_chat_server_connected

# Navigate to session list if server available
- tapOn:
    text: "Sessions"
    optional: true

# Wait for session list
- extendedWaitUntil:
    visible: "Search sessions..."
    timeout: 15000
    optional: true

- assertVisible:
    text: "Search sessions..."
    optional: true
- takeScreenshot: l4_chat_session_list
