appId: dev.leonardo.ocremoteplus.dev
name: L3 - Compaction Banner
tags:
  - layer3
  - compaction
---

# Launch app
- launchApp

# Wait for home screen
- extendedWaitUntil:
    visible: "OC Remote"
    timeout: 15000

- assertVisible: "OC Remote"
- takeScreenshot: l3_compaction_app_loaded

# Verify the home screen renders without crash
# CompactionBanner appears during context compression in active sessions
- assertVisible: "Add Server"
- takeScreenshot: l3_compaction_home

# Navigate through screens to verify no crash
- swipe:
    direction: DOWN

- takeScreenshot: l3_compaction_scrolled

- swipe:
    direction: UP

- assertVisible: "OC Remote"
- takeScreenshot: l3_compaction_scrolled_back
