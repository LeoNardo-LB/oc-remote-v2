appId: dev.leonardo.ocremoteplus.dev
name: L1 - Connection Error Screen
tags:
  - layer1
  - network
---

# Launch app
- launchApp

# Wait for home screen to render
- extendedWaitUntil:
    visible: "OC Remote"
    timeout: 15000

# Assert app loaded without crash
- assertVisible: "OC Remote"
- takeScreenshot: l1_connection_state

# Verify empty state text (app renders properly even without server)
- assertVisible: "Add Server"
- takeScreenshot: l1_connection_empty_state
