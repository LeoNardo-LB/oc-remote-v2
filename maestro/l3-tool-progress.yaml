appId: dev.leonardo.ocremoteplus.dev
name: L3 - Tool Progress Card
tags:
  - layer3
  - tools
---

# Launch app
- launchApp

# Wait for home screen
- extendedWaitUntil:
    visible: "OC Remote"
    timeout: 15000

- assertVisible: "OC Remote"
- takeScreenshot: l3_tool_app_loaded

# If server is connected, navigate to a session to check chat UI
# Check if Connect button exists (server configured)
- assertVisible:
    text: "Connect"
    optional: true
- takeScreenshot: l3_tool_server_found

# Navigate to session list if server available
- tapOn:
    text: "Sessions"
    optional: true

# Wait for sessions to load
- extendedWaitUntil:
    visible: "Search sessions..."
    timeout: 15000
    optional: true

- assertVisible:
    text: "Search sessions..."
    optional: true
- takeScreenshot: l3_tool_session_list

# Try to tap on first visible session (if any exists)
# ToolProgressCard appears during active tool execution in chat
# This flow verifies the session list and chat screen render without crash
- extendedWaitUntil:
    visible: ".*"
    timeout: 5000
    optional: true

- takeScreenshot: l3_tool_sessions_loaded
