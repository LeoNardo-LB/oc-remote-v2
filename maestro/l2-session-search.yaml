appId: dev.minios.ocremote.dev
name: L2 - Session Search
tags:
  - layer2
  - sessions
  - search
  - manual
---
# Manual test: Requires a configured, connected server with sessions.
# Run: maestro test maestro/l2-session-search.yaml
# Setup: Add server in Home → Connect → Verify sessions exist → Run this flow

- launchApp
- extendedWaitUntil:
    visible: ".*"
    timeout: 10000

# Navigate to session list
- tapOn: "Sessions"

# Wait for search bar
- extendedWaitUntil:
    visible: "Search sessions..."
    timeout: 15000
- takeScreenshot: l2_session_search_initial

# Search
- tapOn: "Search sessions..."
- inputText: "test"
- extendedWaitUntil:
    visible: "test"
    timeout: 10000
- assertVisible: "test"
- takeScreenshot: l2_session_search_filtered

# Clear
- tapOn: "Clear search"
- extendedWaitUntil:
    visible: "Search sessions..."
    timeout: 10000
- assertVisible: "Search sessions..."
- takeScreenshot: l2_session_search_cleared
