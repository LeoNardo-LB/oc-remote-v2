appId: dev.leonardo.ocremoteplus.dev
name: L2 - Session Search
tags:
  - layer2
  - sessions
  - search
---

# Launch app
- launchApp

# Wait for home screen
- extendedWaitUntil:
    visible: "OC Remote"
    timeout: 15000

- assertVisible: "OC Remote"

# Check if server is connected (Connect button visible = server configured)
- assertVisible:
    text: "Connect"
    optional: true
- takeScreenshot: l2_search_server_connected

# Navigate to session list if server available
- tapOn:
    text: "Sessions"
    optional: true

# Wait for session list to load
- extendedWaitUntil:
    visible: "Search sessions..."
    timeout: 15000
    optional: true

- assertVisible:
    text: "Search sessions..."
    optional: true
- takeScreenshot: l2_session_search_initial

# Tap on search bar
- tapOn:
    text: "Search sessions..."
    optional: true

# Enter search text
- inputText: "test"

# Wait for search results or empty state
- extendedWaitUntil:
    visible: ".*"
    timeout: 10000
    optional: true

- takeScreenshot: l2_session_search_typed

# Press back to dismiss keyboard and go back
- pressKey: BACK

# Wait for session list
- extendedWaitUntil:
    visible: "Search sessions..."
    timeout: 10000
    optional: true

- assertVisible:
    text: "Search sessions..."
    optional: true
- takeScreenshot: l2_session_search_done
