appId: dev.minios.ocremote.dev
name: "E2E Dark + AMOLED Screenshot Capture"
tags:
  - e2e
  - amoled
  - visual
---
# 前提：Dark 主题已通过 ADB 手动启用
# 此流程仅做截图采集

- launchApp
- waitForAnimationToEnd

# === Dark 模式截图 ===
- takeScreenshot: e2e/07-dark-mode-home

# Sessions
- tapOn: "Sessions"
- waitForAnimationToEnd
- takeScreenshot: e2e/07-dark-sessions

# Chat
- tapOn:
    point: "540,600"
- waitForAnimationToEnd
- takeScreenshot: e2e/07-dark-chat

- scroll
- waitForAnimationToEnd
- takeScreenshot: e2e/07-dark-chat-scrolled

# 返回主页
- tapOn:
    point: "70,150"
- waitForAnimationToEnd
- tapOn:
    point: "70,150"
- waitForAnimationToEnd

# === 启用 AMOLED ===
- tapOn:
    point: "880,150"
- waitForAnimationToEnd
- assertVisible: "AMOLED dark mode"
- tapOn: "AMOLED dark mode"
- waitForAnimationToEnd
- takeScreenshot: e2e/07-amoled-settings

- tapOn:
    point: "70,150"
- waitForAnimationToEnd
- takeScreenshot: e2e/07-amoled-home

# AMOLED Sessions
- tapOn: "Sessions"
- waitForAnimationToEnd
- takeScreenshot: e2e/07-amoled-sessions

# AMOLED Chat
- tapOn:
    point: "540,600"
- waitForAnimationToEnd
- takeScreenshot: e2e/07-amoled-chat

- scroll
- waitForAnimationToEnd
- takeScreenshot: e2e/07-amoled-chat-scrolled

# === 恢复 ===
- tapOn:
    point: "70,150"
- waitForAnimationToEnd
- tapOn:
    point: "70,150"
- waitForAnimationToEnd

# 关闭 AMOLED
- tapOn:
    point: "880,150"
- waitForAnimationToEnd
- assertVisible: "AMOLED dark mode"
- tapOn: "AMOLED dark mode"
- waitForAnimationToEnd

- tapOn:
    point: "70,150"
- waitForAnimationToEnd
- takeScreenshot: e2e/07-dark-restored-home
