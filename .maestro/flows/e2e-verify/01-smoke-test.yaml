appId: dev.minios.ocremote.dev
name: "E2E Smoke Test - App Launch & Render"
tags:
  - e2e
  - smoke
---
# 冒烟测试：验证应用正常启动、无 crash、HomeScreen 渲染正常

- launchApp
- waitForAnimationToEnd

# 验证顶部标题栏存在
- assertVisible: "OC Remote"

# 验证服务器卡片渲染（已连接状态）
- assertVisible: "Connected"

# 截图记录基线
- takeScreenshot: e2e/01-smoke-home
