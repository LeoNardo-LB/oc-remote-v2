appId: dev.minios.ocremote.dev
name: "E2E Session List Verification"
tags:
  - e2e
  - sessions
---
# Session 列表验证
# 验证：会话列表页面渲染、会话项显示、搜索栏

- launchApp
- waitForAnimationToEnd

# 进入 Session 列表
- tapOn: "Sessions"
- waitForAnimationToEnd

# 截图：会话列表
- takeScreenshot: e2e/05-session-list

# 滚动查看更多会话
- scroll
- waitForAnimationToEnd
- takeScreenshot: e2e/05-session-list-scrolled

# 返回主页
- tapOn:
    point: "70,150"
- waitForAnimationToEnd
- takeScreenshot: e2e/05-back-home
