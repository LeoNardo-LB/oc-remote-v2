appId: dev.minios.ocremote.dev
name: "E2E Settings Screen Verification"
tags:
  - e2e
  - settings
---
# Settings 页面验证（Task 10 maxWidth constraint）

- launchApp
- waitForAnimationToEnd

# 导航到 Settings
- tapOn:
    point: "880,150"
- waitForAnimationToEnd

- assertVisible: "Settings"
- takeScreenshot: e2e/03-settings-full

# 滚动查看更多设置项
- scroll
- waitForAnimationToEnd
- takeScreenshot: e2e/03-settings-scrolled

# 返回主页：重新启动应用（back 会退出整个应用）
- launchApp
- waitForAnimationToEnd

- assertVisible: "OC Remote"
- takeScreenshot: e2e/03-back-home
