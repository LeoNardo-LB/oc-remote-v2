appId: dev.minios.ocremote.dev
name: "连接并进入聊天测试滚动"
tags:
  - scroll-test
---
# 启动应用
- launchApp
- waitForAnimationToEnd

# 连接服务器（之前已保存配置）
- tapOn: "Connect"
- waitForAnimationToEnd

# 等待连接
- extendedWaitUntil:
    visible: "Sessions"
    timeout: 15000

# 进入 Sessions 列表
- tapOn: "Sessions"
- waitForAnimationToEnd

# 截图看会话列表
- takeScreenshot: 20-session-list

# 点击第一个会话（列表中的第一个文本条目）
# 用坐标点击：会话列表第一项大约在 y=350
- tapOn:
    point: "540,350"
- waitForAnimationToEnd

# 等待聊天界面加载 — placeholder 文本会随上下文变化（如 "Ask a question", "Add tests for..."），
# 所以检测一个更稳定的元素：发送按钮或 GLM 模型标签
- extendedWaitUntil:
    visible: "Build"
    timeout: 10000

# 关键截图 — 进入会话后的滚动位置
- takeScreenshot: 21-chat-after-enter

# 获取 UI hierarchy 分析滚动位置
