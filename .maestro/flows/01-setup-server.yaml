appId: dev.minios.ocremote.dev
name: "配置服务器并连接"
tags:
  - setup
---
# 清除应用数据，从干净状态开始
- clearState
- launchApp
- waitForAnimationToEnd

# === 添加服务器 ===
- assertVisible: "Add Server"
- tapOn: "Add Server"
- waitForAnimationToEnd

# 服务器名称
- tapOn:
    point: "540,704"
- eraseText: 100
- inputText: "Test"

# 服务器 URL
- tapOn:
    point: "540,930"
- eraseText: 100
- inputText: "http://10.0.2.2:4096"

# 用户名
- tapOn:
    point: "540,1157"
- eraseText: 100
- inputText: "opencode"

# 密码
- tapOn:
    point: "540,1357"
- eraseText: 100
- inputText: "leonardo123"

# 保存
- tapOn: "Save"
- waitForAnimationToEnd

# === 连接服务器 ===
- assertVisible: "Connect"
- tapOn: "Connect"
- waitForAnimationToEnd

# 等待连接成功 — 应该看到 Connected 或 Sessions
- extendedWaitUntil:
    visible: "Connected"
    timeout: 15000

- takeScreenshot: 10-connected
